<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXGEN — NEXT-GEN MULTI-IDE WORKSPACE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Montserrat:wght@200;400;700&family=Fira+Code:wght@400;500&family=Impact&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        :root {
            --bg-dark: #020205;
            --accent-glow: linear-gradient(135deg, #00f2fe 0%, #ff007f 100%);
            --cyber-blue: #00f2fe;
            --cyber-pink: #ff007f;
            --text-font: 'Plus Jakarta Sans', sans-serif;
            --title-font: 'Cinzel Decorative', serif;
            --sub-font: 'Montserrat', sans-serif;
            --code-font: 'Fira Code', monospace;
            --marvel-font: 'Impact', sans-serif;
            
            --current-ratio: 1 / 1;
            --max-w: 450px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--text-font);
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html, body {
            background-color: var(--bg-dark);
            color: #ffffff;
            height: 100dvh;
            width: 100%;
            overflow: hidden; 
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 50%, #090914 0%, #020205 100%);
            top: 0px !important;
        }

        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background: #000000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
            transform-style: preserve-3d;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            will-change: opacity, transform;
        }

        .intro-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 2;
        }

        .intro-bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.18) 0%, rgba(255, 0, 127, 0.06) 50%, transparent 70%);
            opacity: 0;
            transform: scale(0.6) translateZ(0); 
            pointer-events: none;
            filter: blur(40px);
            will-change: opacity, transform;
        }

        .intro-title-box {
            padding: 10px 20px;
            transform: scale(0.9) translateZ(0);
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            will-change: opacity, transform;
        }

        .intro-title {
            font-family: var(--marvel-font);
            font-size: clamp(3.2rem, 10vw, 6.5rem);
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffffff;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2), 0 0 60px rgba(0, 242, 254, 0.3);
            display: flex;
        }

        .intro-title span {
            display: inline-block;
            transform: translateY(20px) translateZ(0);
            opacity: 0;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            will-change: opacity, transform;
        }

        .developer-credit {
            font-family: var(--sub-font);
            font-size: clamp(0.65rem, 2vw, 0.8rem);
            font-weight: 600;
            letter-spacing: 7px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            opacity: 0;
            transform: translateY(10px) translateZ(0);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            will-change: opacity, transform;
        }

        .developer-credit .sub-line {
            height: 1px;
            width: 60px;
            background: rgba(255, 255, 255, 0.2);
        }

        .developer-credit span {
            font-family: var(--sub-font);
            font-size: clamp(1.1rem, 3.5vw, 1.5rem);
            font-weight: 700;
            background: #ffffff;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 14px;
            display: inline-block;
            margin-top: 6px;
            padding-left: 14px;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.4));
        }

        #app-container {
            width: 100%;
            height: 100dvh;
            display: none;
            flex-direction: column;
            padding: 15px;
            opacity: 0;
            max-width: 1100px;
            gap: 12px;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            width: 100%;
            flex-shrink: 0;
        }

        .logo {
            font-family: var(--title-font);
            font-size: clamp(0.95rem, 3.5vw, 1.35rem);
            letter-spacing: 2px;
            text-transform: uppercase;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.3));
        }

        #google_translate_element {
            min-width: 140px;
        }
        .goog-te-gadget-simple {
            background-color: rgba(255, 255, 255, 0.04) !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            padding: 5px 10px !important;
            border-radius: 20px !important;
        }
        .goog-te-gadget-simple span { color: #ffffff !important; font-size: 11px !important; }
        .goog-te-banner-frame { display: none !important; }

        .hub-navigator {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 10px;
            width: 100%;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            flex-shrink: 0;
        }
        .hub-navigator::-webkit-scrollbar { display: none; }

        .mode-tab {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mode-tab.active {
            background: var(--accent-glow);
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }

        .size-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            align-items: center;
            width: 100%;
            flex-wrap: wrap; 
            max-width: 380px; 
            margin: 0 auto;
            flex-shrink: 0;
        }

        .size-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: clamp(0.7rem, 1.8vw, 0.8rem);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .size-btn.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .workspace {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex: 1; 
            min-height: 0;
            overflow: hidden;
        }

        .media-container {
            width: 100%;
            max-width: var(--max-w);
            max-height: 100%;
            aspect-ratio: var(--current-ratio); 
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            overflow: hidden;
            transform: translateZ(0);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .placeholder-icon {
            font-size: clamp(2rem, 5vw, 2.8rem);
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.3;
            text-align: center;
        }
        
        .placeholder-icon span {
            display: block;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 8px;
            font-family: var(--sub-font);
            letter-spacing: 2px;
        }

        .output-render, .output-video, .output-audio, model-viewer {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7);
            transform: translateZ(0);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        model-viewer {
            background: radial-gradient(circle, #151525 0%, #05050f 100%);
        }

        .output-audio {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px;
            gap: 20px;
        }

        .output-audio i {
            font-size: 3.5rem;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .fa-spin-slow {
            animation: spin 6s linear infinite;
        }

        .output-audio audio {
            width: 100%;
            max-width: 320px;
        }

        .download-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: #ffffff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 20;
            opacity: 0;
            transform: scale(0.8) translateZ(0);
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .control-area {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 10px 0;
            flex-shrink: 0;
            margin-top: auto; 
        }

        .chat-input-wrapper {
            width: 100%;
            max-width: 750px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            backdrop-filter: blur(30px);
        }

        .icon-btn-inside {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.2s;
        }
        .icon-btn-inside:hover { color: #ffffff; background: rgba(255,255,255,0.05); }

        .mic-active {
            color: #ff007f !important;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .chat-input-wrapper input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            padding: 10px 4px;
        }

        .send-generation-btn {
            background: #ffffff;
            border: none;
            outline: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000000;
        }

        .thumb-preview-box {
            display: none;
            position: absolute;
            top: -70px;
            left: 20px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px;
            border-radius: 12px;
            align-items: center;
            gap: 10px;
            z-index: 50;
        }

        .thumb-preview-box .preview-icon {
            font-size: 1.5rem; color: var(--cyber-blue); padding: 5px;
        }
        .thumb-preview-box img { width: 42px; height: 42px; object-fit: cover; border-radius: 8px; }
        .thumb-preview-box .close-thumb { color: rgba(255, 255, 255, 0.4); cursor: pointer; font-size: 0.85rem; }

        .ai-loader {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 99;
            display: flex;
            justify-content: center;
            align-items: center;
            display: none;
            opacity: 0;
            background: rgba(2, 2, 5, 0.85);
            border-radius: 16px;
        }

        .kinetic-ring {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(255, 255, 255, 0.03);
            border-top: 3px solid #00f2fe;
            border-bottom: 3px solid #ff007f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #shakil-universal-gallery {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background: rgba(2, 2, 5, 0.96);
            backdrop-filter: blur(25px);
            z-index: 10000;
            display: none;
            opacity: 0;
            padding: 30px;
            overflow-y: auto;
            flex-direction: column;
            gap: 25px;
            transform: translateZ(0);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 15px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .gallery-title {
            font-family: var(--title-font);
            font-size: clamp(1.1rem, 3vw, 1.6rem);
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .gallery-close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .gallery-close-btn:hover { background: #ffffff; color: #000000; }

        .gallery-body-layout {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
            align-items: start;
        }

        .gallery-upload-zone {
            background: rgba(255, 255, 255, 0.02);
            border: 2px dashed rgba(0, 242, 254, 0.3);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .gallery-upload-zone:hover {
            background: rgba(0, 242, 254, 0.03);
            border-color: var(--cyber-blue);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
        }
        .gallery-upload-zone i {
            font-size: 2.2rem;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gallery-upload-zone p { font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); }

        .gallery-view-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            min-height: 300px;
        }

        .gallery-item-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 1/1;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .gallery-item-card:hover {
            transform: translateY(-4px) translateZ(0);
            border-color: var(--cyber-pink);
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.2);
        }
        .gallery-item-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .gallery-item-card .file-meta {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
            text-align: center;
            word-break: break-all;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .gallery-item-select-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.2s;
            border-radius: 14px;
        }
        .gallery-item-card:hover .gallery-item-select-layer { opacity: 1; }
        .gallery-item-select-layer button {
            background: #ffffff; color: #000; border: none;
            padding: 6px 14px; border-radius: 15px; font-size: 0.75rem; font-weight: 700;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .gallery-body-layout { grid-template-columns: 1fr; gap: 20px; }
            #app-container { padding: 10px; gap: 8px; }
            .media-container { width: 95%; }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-bg-glow" id="intro-glow"></div>
        <div class="intro-container">
            <div class="intro-title-box" id="int-box">
                <h1 class="intro-title" id="int-title">
                    <span>N</span><span>E</span><span>X</span><span>T</span>&nbsp;<span>G</span><span>E</span><span>N</span>
                </h1>
            </div>
            <div class="developer-credit" id="int-credit">
                <div class="sub-line"></div>
                ENTERPRISE WORKSPACE PLATFORM BY <span>SHAKIL</span>
            </div>
        </div>
    </div>

    <div id="app-container">
        <header>
            <div class="logo">Nexgen</div>
            <div id="google_translate_element"></div>
        </header>

        <div class="hub-navigator">
            <button class="mode-tab active" onclick="switchEngineMode('Image Engine.py', this)"><i class="fa-solid fa-image"></i> Image Engine</button>
            <button class="mode-tab" onclick="switchEngineMode('loop GIF.py', this)"><i class="fa-solid fa-bolt"></i> loop GIF</button>
            <button class="mode-tab" onclick="switchEngineMode('Video Studio.py', this)"><i class="fa-solid fa-video"></i> Video Studio</button>
            <button class="mode-tab" onclick="switchEngineMode('Audio Music.py', this)"><i class="fa-solid fa-music"></i> Audio/Music</button>
            <button class="mode-tab" onclick="switchEngineMode('Voice Synthesizer.py', this)"><i class="fa-solid fa-waveform-lines"></i> Voice Synthesizer</button>
            <button class="mode-tab" onclick="switchEngineMode('Smart Text Editor.py', this)"><i class="fa-solid fa-comment-dots"></i> Smart Text Editor</button>
            <button class="mode-tab" onclick="switchEngineMode('Dynamic IDE Coder.py', this)"><i class="fa-solid fa-code"></i> Dynamic IDE Coder</button>
            <button class="mode-tab" onclick="switchEngineMode('3D Mesh Engine.py', this)"><i class="fa-solid fa-cube"></i> 3D Mesh Engine</button>
        </div>

        <div class="size-selector" id="ratio-panel">
            <button class="size-btn active" onclick="changeRatio('1/1', this, 450)">1:1 Square</button>
            <button class="size-btn" onclick="changeRatio('16/9', this, 650)">16:9 Landscape</button>
            <button class="size-btn" onclick="changeRatio('9/16', this, 300)">9:16 Portrait</button>
        </div>

        <main class="workspace" id="workspace-area">
            <div class="media-container" id="media-container">
                <div class="ai-loader" id="ai-loading-layer">
                    <div class="kinetic-ring"></div>
                </div>

                <div class="placeholder-icon" id="v-placeholder">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span id="placeholder-text">IMAGINATION HUB</span>
                </div>

                <img src="" alt="AI Output" class="output-render" id="output-view">
                <video src="" class="output-video" id="output-video-view" controls loop playsinline></video>
                
                <model-viewer id="output-3d-view" src="" camera-controls auto-rotate shadow-intensity="1" alt="A 3D model generated by Nexgen"></model-viewer>
                
                <div class="output-audio" id="output-audio-view">
                    <i class="fa-solid fa-compact-disc fa-spin-slow" id="audio-disc-icon"></i>
                    <audio src="" id="audio-player" controls></audio>
                </div>

                <button class="download-btn" id="download-trigger" onclick="executeHighResDownload()">
                    <i class="fa-solid fa-arrow-down"></i>
                </button>
            </div>
        </main>

        <footer class="control-area">
            <div class="chat-input-wrapper" id="input-bar">
                <div class="thumb-preview-box" id="thumb-container">
                    <div id="thumb-preview-render"></div>
                    <i class="fa-solid fa-circle-xmark close-thumb" onclick="removeUploadedImage()"></i>
                </div>

                <div class="icon-btn-inside" id="mic-trigger" onclick="toggleVoiceRecognition()">
                    <i class="fa-solid fa-microphone"></i>
                </div>

                <div class="icon-btn-inside" id="gallery-trigger" onclick="openUniversalGallery()">
                    <i class="fa-solid fa-paperclip"></i>
                </div>

                <input type="text" id="prompt-msg" placeholder="Ask Nexgen to create...">

                <button class="send-generation-btn" id="submit-btn" onclick="startAdvancedGeneration()">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
        </footer>
    </div>

    <div id="shakil-universal-gallery">
        <div class="gallery-header">
            <div class="gallery-title"><i class="fa-solid fa-folder-open"></i> NEXT GEN CLOUD HUB</div>
            <button class="gallery-close-btn" onclick="closeUniversalGallery()">Close Gallery</button>
        </div>
        
        <div class="gallery-body-layout">
            <div class="gallery-upload-zone" onclick="document.getElementById('gallery-raw-file').click()">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <h3>Upload Anything</h3>
                <p>Images, Videos, Code, Audio, Text & 3D Assets</p>
                <input type="file" id="gallery-raw-file" style="display:none;" onchange="processGalleryUpload(this)">
            </div>

            <div class="gallery-view-grid" id="gallery-item-container"></div>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        let currentMode = 'Image Engine.py';
        let currentActiveBlob = null;
        let recognition = null;
        let isListening = false;
        let selectedFilePayload = null;

        document.addEventListener("DOMContentLoaded", () => {
            // GSAP টাইমলাইন একদম শুরুতেই রান করবে কোনো লেট ছাড়া
            let introTimeline = gsap.timeline({
                onComplete: () => {
                    // অ্যানিমেশন শেষ হওয়া মাত্রই ইন্ট্রো স্ক্রিন হাইড হবে এবং মেইন অ্যাপ শো হবে
                    gsap.to("#intro-screen", {
                        opacity: 0, 
                        scale: 0.98,
                        duration: 0.5, 
                        ease: "power2.inOut",
                        force3D: true,
                        onComplete: () => {
                            document.getElementById("intro-screen").style.display = "none";
                            const app = document.getElementById("app-container");
                            app.style.display = "flex"; 
                            gsap.to(app, { opacity: 1, duration: 0.3, force3D: true });
                            syncGalleryData();
                        }
                    });
                }
            });
            
            // আটকানো বা জাম্প করা বন্ধ করতে ভ্যালু অপ্টিমাইজ করা হয়েছে এবং immediateRender ট্রু করা হয়েছে
            introTimeline.to("#intro-glow", { opacity: 1, scale: 1.1, duration: 1.0, ease: "power2.out", force3D: true, immediateRender: true });
            introTimeline.to("#int-box", { opacity: 1, scale: 1, duration: 0.6, ease: "power3.out", force3D: true }, "-=0.7");
            introTimeline.to("#int-title span", { opacity: 1, y: 0, duration: 0.4, stagger: 0.04, ease: "power2.out", force3D: true }, "-=0.4");
            introTimeline.to("#int-credit", { opacity: 1, y: 0, duration: 0.5, ease: "power2.out", force3D: true }, "-=0.2");
            // স্ক্রিনটি হোল্ড করার জন্য একটি সামান্য পজ
            introTimeline.to({}, { duration: 1.2 }); 

            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechObj = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechObj();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = 'bn-BD';

                recognition.onresult = (event) => {
                    document.getElementById("prompt-msg").value = event.results[0][0].transcript;
                    toggleMicUI(false);
                };
                recognition.onerror = () => { toggleMicUI(false); };
                recognition.onend = () => { toggleMicUI(false); };
            }
        });

        function openUniversalGallery() {
            const gallery = document.getElementById("shakil-universal-gallery");
            gallery.style.display = "flex";
            gsap.fromTo(gallery, { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.4, ease: "power3.out", force3D: true });
            syncGalleryData();
        }

        function closeUniversalGallery() {
            const gallery = document.getElementById("shakil-universal-gallery");
            gsap.to(gallery, { opacity: 0, y: 20, duration: 0.3, force3D: true, onComplete: () => { gallery.style.display = "none"; } });
        }

        async function syncGalleryData() {
            try {
                const res = await fetch(`/gallery?t=${Date.now()}`, { cache: "no-store" });
                if (!res.ok) throw new Error();
                const data = await res.json();
                const grid = document.getElementById("gallery-item-container");
                grid.innerHTML = "";
                
                if (data.items && data.items.length > 0) {
                    data.items.forEach(file => {
                        renderFileCard(file.name, file.url, grid);
                    });
                }
            } catch(e) { console.log("Storage Sync Standing by."); }
        }

        function processGalleryUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const fileBase64 = e.target.result;
                const grid = document.getElementById("gallery-item-container");
                
                renderFileCard(file.name, fileBase64, grid, true);
                
                const formData = new FormData();
                formData.append('file', file);
                fetch('/upload', { method: 'POST', body: formData }).catch(() => {});
            };
            reader.readAsDataURL(file);
        }

        function renderFileCard(name, url, targetGrid, isFallback = false) {
            const card = document.createElement("div");
            card.className = "gallery-item-card";
            let iconMarkup = `<i class="fa-solid fa-file-code" style="font-size:2.5rem;color:var(--cyber-blue);"></i>`;
            
            const lowName = name.toLowerCase();
            if (lowName.endsWith('.mp4') || lowName.endsWith('.webm')) {
                iconMarkup = `<i class="fa-solid fa-video" style="font-size:2.5rem;color:#ff007f;"></i>`;
            } else if (lowName.endsWith('.mp3') || lowName.endsWith('.wav')) {
                iconMarkup = `<i class="fa-solid fa-music" style="font-size:2.5rem;color:#18bbff;"></i>`;
            } else if (lowName.endsWith('.glb') || lowName.endsWith('.gltf')) {
                iconMarkup = `<i class="fa-solid fa-cube" style="font-size:2.5rem;color:#ffaa00;"></i>`;
            } else if (lowName.endsWith('.txt')) {
                iconMarkup = `<i class="fa-solid fa-file-lines" style="font-size:2.5rem;color:#00ff88;"></i>`;
            } else if (url.startsWith('data:image') || /\.(png|jpg|jpeg|webp|gif)$/i.test(lowName)) {
                iconMarkup = `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
            }

            card.innerHTML = `
                <div style="width:100%; height:80%; display:flex; align-items:center; justify-content:center; overflow:hidden;">${iconMarkup}</div>
                <div class="file-meta">${name}</div>
                <div class="gallery-item-select-layer">
                    <button onclick="selectGalleryMedia('${url}', '${name}')">Load Asset</button>
                </div>
            `;
            targetGrid.insertBefore(card, targetGrid.firstChild);
        }

        function selectGalleryMedia(src, name) {
            selectedFilePayload = { src: src, name: name };
            const previewBox = document.getElementById("thumb-preview-render");
            const lowName = name.toLowerCase();
            
            if (src.startsWith('data:image') || /\.(png|jpg|jpeg|webp|gif)$/i.test(lowName)) {
                previewBox.innerHTML = `<img src="${src}" id="thumb-img">`;
            } else {
                previewBox.innerHTML = `<div class="preview-icon"><i class="fa-solid fa-file-import"></i></div>`;
            }
            
            document.getElementById("thumb-container").style.display = "flex";
            closeUniversalGallery();

            let targetModeFile = '';
            if (/\.(png|jpg|jpeg|webp)$/i.test(lowName)) targetModeFile = 'Image Engine.py';
            else if (/\.(gif)$/i.test(lowName)) targetModeFile = 'loop GIF.py';
            else if (/\.(mp4|webm|mkv|avi)$/i.test(lowName)) targetModeFile = 'Video Studio.py';
            else if (/\.(mp3|wav|ogg|flac)$/i.test(lowName)) targetModeFile = 'Audio Music.py';
            else if (/\.(glb|gltf|obj|fbx)$/i.test(lowName)) targetModeFile = '3D Mesh Engine.py';
            else if (/\.(html|css|js|py|cpp|c|cs|java|json|sh|php)$/i.test(lowName)) targetModeFile = 'Dynamic IDE Coder.py';
            else if (/\.(txt|md|doc|docx|pdf)$/i.test(lowName)) targetModeFile = 'Smart Text Editor.py';

            if (targetModeFile) {
                document.querySelectorAll('.mode-tab').forEach(tab => {
                    tab.classList.remove('active');
                    if (tab.getAttribute('onclick').includes(targetModeFile)) {
                        switchEngineMode(targetModeFile, tab);
                    }
                });
            }
        }

        function removeUploadedImage() {
            selectedFilePayload = null;
            document.getElementById("thumb-container").style.display = "none";
        }

        function toggleVoiceRecognition() {
            if (!recognition) return;
            if (isListening) { recognition.stop(); } else { recognition.start(); toggleMicUI(true); }
        }

        function toggleMicUI(listening) {
            isListening = listening;
            const micIcon = document.getElementById("mic-trigger").querySelector("i");
            if (listening) { micIcon.classList.add("mic-active"); } else { micIcon.classList.remove("mic-active"); }
        }

        function switchEngineMode(modeFile, element) {
            currentMode = modeFile;
            document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');

            const inputField = document.getElementById("prompt-msg");
            const ratioPanel = document.getElementById("ratio-panel");
            const placeholderText = document.getElementById("placeholder-text");
            const mediaContainer = document.getElementById("media-container");

            resetWorkspaceDisplay();
            
            if (modeFile === 'Smart Text Editor.py' || modeFile === 'Dynamic IDE Coder.py') {
                mediaContainer.style.display = "none"; 
                inputField.placeholder = modeFile === 'Smart Text Editor.py' ? "Ask anything, scriptwriting, reasoning..." : "Write prompt to code application...";
                ratioPanel.style.display = "none";
            } else {
                mediaContainer.style.display = "flex"; 
                ratioPanel.style.display = "flex";
                
                if (modeFile === 'Image Engine.py') { inputField.placeholder = "Ask Nexgen to create image..."; placeholderText.innerText = "IMAGINATION HUB"; }
                else if (modeFile === 'loop GIF.py') { inputField.placeholder = "Describe loop GIF animation..."; placeholderText.innerText = "CINEMATIC GIF HUB"; }
                else if (modeFile === 'Video Studio.py') { inputField.placeholder = "Write prompt for cinematic video..."; placeholderText.innerText = "MOTION PICTURE HUB"; }
                else if (modeFile === 'Audio Music.py') { inputField.placeholder = "Write lyrics or genre..."; ratioPanel.style.display = "none"; placeholderText.innerText = "AI MUSIC HARMONY"; }
                else if (modeFile === 'Voice Synthesizer.py') { inputField.placeholder = "Type text to generate synthetic voice..."; ratioPanel.style.display = "none"; placeholderText.innerText = "VOICE REPLICATION HUB"; }
                else if (modeFile === '3D Mesh Engine.py') { inputField.placeholder = "Describe 3D asset/mesh (.glb)..."; ratioPanel.style.display = "none"; placeholderText.innerText = "3D MATRIX CONSTRUCTOR"; }
            }
        }

        function resetWorkspaceDisplay() {
            document.getElementById("v-placeholder").style.display = "block";
            document.getElementById("v-placeholder").style.opacity = "0.3";
            document.getElementById("v-placeholder").style.transform = "scale(1)";
            document.getElementById("output-view").style.display = "none";
            document.getElementById("output-video-view").style.display = "none";
            document.getElementById("output-audio-view").style.display = "none";
            document.getElementById("output-3d-view").style.display = "none";
            document.getElementById("download-trigger").style.opacity = "0";
            document.getElementById("download-trigger").style.pointerEvents = "none";
            currentActiveBlob = null;
        }

        function changeRatio(ratio, btn, maxWidth) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const container = document.getElementById('media-container');
            
            container.style.setProperty('--current-ratio', ratio);
            container.style.setProperty('--max-w', maxWidth + "px");

            gsap.fromTo(container, 
                { scale: 0.98 }, 
                { scale: 1, duration: 0.4, ease: "back.out(1.2)", force3D: true }
            );
        }

        async function startAdvancedGeneration() {
            const textPrompt = document.getElementById("prompt-msg").value.trim();
            const activeRatio = document.querySelector('.size-btn.active') ? document.querySelector('.size-btn.active').innerText : "1:1";
            
            if (!textPrompt && !selectedFilePayload) {
                gsap.to("#input-bar", { x: 8, duration: 0.05, repeat: 3, yoyo: true, force3D: true }); return;
            }

            const loaderLayer = document.getElementById("ai-loading-layer");
            const placeholder = document.getElementById("v-placeholder");
            const dlBtn = document.getElementById("download-trigger");
            const submitBtn = document.getElementById("submit-btn");

            resetWorkspaceDisplay();
            loaderLayer.style.display = "flex";
            gsap.killTweensOf([loaderLayer, placeholder]);
            gsap.to(loaderLayer, { opacity: 1, duration: 0.2, force3D: true });
            gsap.to(placeholder, { scale: 0.8, opacity: 0.1, duration: 0.3, force3D: true });
            
            dlBtn.style.opacity = "0"; 
            dlBtn.style.pointerEvents = "none";
            submitBtn.disabled = true;

            try {
                const response = await fetch(`/generate?nocache=${Date.now()}`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Pragma': 'no-cache',
                        'Cache-Control': 'no-cache, no-store, must-revalidate'
                    },
                    cache: 'no-store',
                    body: JSON.stringify({ 
                        prompt: textPrompt, 
                        fileUrl: selectedFilePayload ? selectedFilePayload.src : null, 
                        fileName: selectedFilePayload ? selectedFilePayload.name : null,
                        mode: currentMode, 
                        ratio: activeRatio 
                    })
                });

                if (!response.ok) { 
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error || `Server Error: ${response.status}`); 
                }

                placeholder.style.display = "none";

                if (currentMode === 'Image Engine.py') {
                    const data = await response.json();
                    const imgView = document.getElementById("output-view");
                    imgView.style.display = "block"; 
                    imgView.src = data.result; 
                    currentActiveBlob = data.result; 

                    gsap.fromTo(imgView, { opacity: 0 }, { opacity: 1, duration: 0.6, force3D: true });
                    dlBtn.style.pointerEvents = "auto"; 
                    gsap.to(dlBtn, { opacity: 1, scale: 1, duration: 0.4, force3D: true });
                }
                else if (currentMode === 'Smart Text Editor.py' || currentMode === 'Dynamic IDE Coder.py') {
                    const data = await response.json();
                    const rawContent = data.result || data.response || data.code || "";
                    const textBlob = new Blob([rawContent], { type: "text/plain;charset=utf-8" });
                    const fileDownloadUrl = URL.createObjectURL(textBlob);
                    
                    const tempLink = document.createElement("a");
                    tempLink.href = fileDownloadUrl;
                    tempLink.download = currentMode === 'Dynamic IDE Coder.py' ? 'nexgen-script.html' : 'nexgen-document.txt';
                    document.body.appendChild(tempLink);
                    tempLink.click();
                    document.body.removeChild(tempLink);
                    URL.revokeObjectURL(fileDownloadUrl);
                } 
                else {
                    const blob = await response.blob();
                    currentActiveBlob = URL.createObjectURL(blob);

                    if (currentMode === 'Audio Music.py' || currentMode === 'Voice Synthesizer.py') {
                        const audioView = document.getElementById("output-audio-view");
                        const player = document.getElementById("audio-player");
                        audioView.style.display = "flex";
                        player.src = currentActiveBlob;
                        gsap.fromTo(audioView, { opacity: 0, scale: 0.95 }, { opacity: 1, scale: 1, duration: 0.6, force3D: true });
                    }
                    else if (currentMode === '3D Mesh Engine.py') {
                        const viewer3d = document.getElementById("output-3d-view");
                        viewer3d.style.display = "block";
                        viewer3d.src = currentActiveBlob;
                        gsap.fromTo(viewer3d, { opacity: 0 }, { opacity: 1, duration: 0.6, force3D: true });
                    }
                    else if (currentMode === 'loop GIF.py') {
                        const imgView = document.getElementById("output-view");
                        imgView.style.display = "block"; 
                        imgView.src = currentActiveBlob;
                        gsap.fromTo(imgView, { opacity: 0 }, { opacity: 1, duration: 0.6, force3D: true });
                    } 
                    else if (currentMode === 'Video Studio.py') {
                        const videoView = document.getElementById("output-video-view");
                        videoView.style.display = "block"; 
                        videoView.src = currentActiveBlob; 
                        videoView.play();
                        gsap.fromTo(videoView, { opacity: 0 }, { opacity: 1, duration: 0.6, force3D: true });
                    }
                    dlBtn.style.pointerEvents = "auto"; 
                    gsap.to(dlBtn, { opacity: 1, scale: 1, duration: 0.4, force3D: true });
                }

                document.getElementById("prompt-msg").value = "";
                removeUploadedImage();

            } catch (error) {
                console.error("Engine Error:", error);
                alert(`Engine Error [${currentMode}]: ${error.message}`);
                placeholder.style.display = "block"; 
                gsap.to(placeholder, { scale: 1, opacity: 0.3, force3D: true });
            } finally {
                gsap.to(loaderLayer, { opacity: 0, duration: 0.2, force3D: true, onComplete: () => { loaderLayer.style.display = "none"; }});
                submitBtn.disabled = false;
            }
        }

        function executeHighResDownload() {
            if (!currentActiveBlob) return;
            
            const tempLink = document.createElement("a");
            tempLink.href = currentActiveBlob;
            
            let ext = "jpg";
            if (currentMode === 'loop GIF.py') ext = "gif";
            else if (currentMode === 'Video Studio.py') ext = "mp4";
            else if (currentMode === 'Audio Music.py' || currentMode === 'Voice Synthesizer.py') ext = "mp3";
            else if (currentMode === '3D Mesh Engine.py') ext = "glb";
            
            tempLink.download = `nexgen-render-${Date.now()}.${ext}`;
            tempLink.style.display = 'none';
            document.body.appendChild(tempLink); 
            tempLink.click(); 
            
            setTimeout(() => {
                document.body.removeChild(tempLink);
            }, 100);
        }
    </script>
</body>
</html>
